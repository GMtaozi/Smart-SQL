version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: sqlbot-postgres
    environment:
      POSTGRES_USER: sqlbot
      POSTGRES_PASSWORD: sqlbot123
      POSTGRES_DB: sqlbot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sqlbot"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: sqlbot-backend
    environment:
      DATABASE_URL: postgresql://sqlbot:sqlbot123@postgres:5432/sqlbot
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-this-in-production}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      DISABLE_VECTOR_SYNC: "true"
      PASSWORD_ENCRYPTION_KEY: ${PASSWORD_ENCRYPTION_KEY:-}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./:/app
    working_dir: /app
    command: uvicorn server.main:app --host 0.0.0.0 --port 8000 --timeout-keep-alive 300
    restart: on-failure
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./client
      dockerfile: ../Dockerfile.frontend
    container_name: sqlbot-frontend
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./client:/app
      - /app/node_modules
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

volumes:
  postgres_data: